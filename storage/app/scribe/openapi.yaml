openapi: 3.0.3
info:
  title: 'Laboratory ERP System API Documentation'
  description: 'Lab ERP System API - Complete laboratory management system with patient management, test tracking, billing, and reporting capabilities.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  -
    name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: apiKey
      name: Authorization
      in: header
      description: 'This API uses session-based authentication. You need to log in first to access most endpoints.'
security:
  -
    default: []
paths:
  /api/auth/login:
    post:
      summary: ''
      operationId: postApiAuthLogin
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: false
                password:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: false
              required:
                - login
                - password
